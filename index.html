<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>Fish Slap Infinite</title>

<style>
body {
  margin: 0;
  background: #111;
  display: flex;
  justify-content: center;
  align-items: center;
  height: 100vh;
  overflow: hidden;
  font-family: Arial, sans-serif;
  user-select: none; 
}

/* Title */
#title {
  position: fixed;
  top: 20px;
  width: 100%;
  text-align: center;
  color: white;
  font-size: 30px;
  z-index: 10;
  font-weight: bold;
}

/* Message */
#startMessage {
  font-size: 16px;
  margin-top: 8px;
  animation: pulse 1.5s infinite;
  font-weight: normal;
}

@keyframes pulse {
  0% { opacity: 0.6; }
  50% { opacity: 1; }
  100% { opacity: 0.6; }
}

/* GIF container */
#gifContainer {
  position: relative;
  width: 88%;
  max-width: 900px;
  height: 55vh;
  display: flex;
  justify-content: center;
  align-items: center;
}

/* PC Sizing */
@media(min-width: 1025px) {
  #gifContainer {
    height: 72vh;
    max-width: 1200px;
  }
}

/* Mobile Sizing */
@media(max-width: 600px) {
  #gifContainer {
    height: 45vh; 
    width: 95%;
  }
  #title {
    font-size: 24px; 
  }
}

/* 🎬 ULTRA SMOOTH CINEMATIC TRANSITIONS */
.gif {
  position: absolute;
  width: 100%;
  height: 100%;
  object-fit: contain;
  left: 50%;
  top: 50%;
  transform: translate(-50%, -50%) scale(1.05);
  border-radius: 12px;
  opacity: 0;
  filter: blur(4px);
  transition:
    opacity 1.2s ease-in-out,
    transform 1.2s ease-in-out,
    filter 1.2s ease-in-out;
  z-index: 0;
}

.gif.active {
  opacity: 1;
  transform: translate(-50%, -50%) scale(1);
  filter: blur(0px);
  z-index: 2;
}

.gif.last-active {
  opacity: 0;
  transform: translate(-50%, -50%) scale(1.08);
  filter: blur(6px);
  z-index: 1;
}

/* Sparkles */
.sparkle {
  position: fixed;
  width: 12px;
  height: 12px;
  background: white;
  border-radius: 50%;
  pointer-events: none;
  animation: sparkle 0.9s forwards;
  z-index: 5;
  box-shadow: 0 0 8px rgba(255,255,255,0.8);
}

@keyframes sparkle {
  to {
    transform: scale(4);
    opacity: 0;
  }
}

/* Button */
#muteButton {
  position: fixed;
  bottom: 20px;
  right: 20px;
  padding: 14px 20px;
  font-size: 16px;
  background: #222;
  color: white;
  border: 2px solid #444;
  border-radius: 10px;
  cursor: pointer;
  font-weight: bold;
  z-index: 10;
}

/* BIG mobile button */
@media(max-width: 600px) {
  #muteButton {
    left: 50%;
    transform: translateX(-50%);
    padding: 18px 28px;
    font-size: 20px;
    border-radius: 16px;
    bottom: 30px;
  }
}
</style>
</head>
<body>

<div id="title">
  FISH SLAP INFINITE 🐟 Thanks Louis
  <div id="startMessage">Touch/click for a surprise 😉</div>
</div>

<div id="gifContainer">
<img class="gif active" src="https://media.giphy.com/media/v1.Y2lkPTc5MGI3NjExYnNuaDE4eGRmazAzeWhzNjZtcmpwNDM4MDgxNzlmc214bGY5bDdyeSZlcD12MV9naWZzX3NlYXJjaCZjdD1n/rgjwOLuv0azHW/giphy.gif">
<img class="gif" src="https://media.giphy.com/media/v1.Y2lkPTc5MGI3NjExYnNuaDE4eGRmazAzeWhzNjZtcmpwNDM4MDgxNzlmc214bGY5bDdyeSZlcD12MV9naWZzX3NlYXJjaCZjdD1n/jX708Wo6abfC8/giphy.gif">
<img class="gif" src="https://media.giphy.com/media/v1.Y2lkPTc5MGI3NjExYnNuaDE4eGRmazAzeWhzNjZtcmpwNDM4MDgxNzlmc214bGY5bDdyeSZlcD12MV9naWZzX3NlYXJjaCZjdD1n/xT0BKGkoBW46ip9OvK/giphy.gif">
<img class="gif" src="https://media.giphy.com/media/v1.Y2lkPTc5MGI3NjExYnNuaDE4eGRmazAzeWhzNjZtcmpwNDM4MDgxNzlmc214bGY5bDdyeSZlcD12MV9naWZzX3NlYXJjaCZjdD1n/y6IvUPfopAZqg/giphy.gif">
<img class="gif" src="https://media.giphy.com/media/v1.Y2lkPTc5MGI3NjExYnNuaDE4eGRmazAzeWhzNjZtcmpwNDM4MDgxNzlmc214bGY5bDdyeSZlcD12MV9naWZzX3NlYXJjaCZjdD1n/26Fff1rJ62MGWEdzO/giphy.gif">
<img class="gif" src="https://media.giphy.com/media/v1.Y2lkPTc5MGI3NjExYnNuaDE4eGRmazAzeWhzNjZtcmpwNDM4MDgxNzlmc214bGY5bDdyeSZlcD12MV9naWZzX3NlYXJjaCZjdD1n/ldUr9VPakWkjNn1Paj/giphy.gif">
<img class="gif" src="https://media.giphy.com/media/v1.Y2lkPTc5MGI3NjExYnNuaDE4eGRmazAzeWhzNjZtcmpwNDM4MDgxNzlmc214bGY5bDdyeSZlcD12MV9naWZzX3NlYXJjaCZjdD1n/M9pbjBHbdYs36/giphy.gif">
</div>

<button id="muteButton">🔊 Mute</button>

<iframe id="musicPlayer" width="0" height="0" src="" allow="autoplay"></iframe>

<script>
const gifs = document.querySelectorAll(".gif");
let i = 0;

/* 🎬 Smooth cinematic rotation */
setInterval(() => {
  const oldIndex = i;
  i = (i + 1) % gifs.length;

  gifs[oldIndex].classList.remove("active");
  gifs[oldIndex].classList.add("last-active");

  gifs[i].classList.add("active");

  setTimeout(() => {
    gifs[oldIndex].classList.remove("last-active");
  }, 1200);

  if (navigator.vibrate && started) {
    navigator.vibrate([40, 20, 40]);
  }
}, 8000);

/* sparkles */
function sparkle(x, y) {
  const s = document.createElement("div");
  s.className = "sparkle";
  s.style.left = x + "px";
  s.style.top = y + "px";
  document.body.appendChild(s);
  setTimeout(() => s.remove(), 900);
}

let lastVibeTime = 0;
function moveVibrate() {
  if (!started) return;

  if (navigator.vibrate) {
    const now = Date.now();
    if (now - lastVibeTime > 150) {
      navigator.vibrate(30);
      lastVibeTime = now;
    }
  }
}

document.addEventListener("pointermove", e => {
  sparkle(e.clientX, e.clientY);
  moveVibrate();
});

/* music */
const iframe = document.getElementById("musicPlayer");
const btn = document.getElementById("muteButton");
const msg = document.getElementById("startMessage");

let started = false;
let playing = false;

function interact(e) {
  if (e.target === btn) return;

  sparkle(e.clientX, e.clientY);

  if (navigator.vibrate) {
    navigator.vibrate(60);
  }

  if (!started) {
    iframe.src = "https://www.youtube.com/embed/U06jlgpMtQs?autoplay=1&loop=1&playlist=U06jlgpMtQs";
    msg.style.display = "none";
    started = true;
    playing = true;
    btn.textContent = "🔇 Mute";
  }
}

document.addEventListener("pointerdown", interact);

/* mute button */
btn.onclick = () => {
  if (navigator.vibrate) {
    navigator.vibrate(60);
  }

  if (playing) {
    iframe.src = "";
    btn.textContent = "🔊 Unmute";
    playing = false;
  } else {
    iframe.src = "https://www.youtube.com/embed/U06jlgpMtQs?autoplay=1&loop=1&playlist=U06jlgpMtQs";
    btn.textContent = "🔇 Mute";
    playing = true;
  }
};
</script>

</body>
</html>
