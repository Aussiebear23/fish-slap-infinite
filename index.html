<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Fish Slap Infinite</title>

<style>

body{
margin:0;
height:100vh;
background:#111;
display:flex;
flex-direction:column;
justify-content:center;
align-items:center;
font-family:Arial, sans-serif;
overflow:hidden;
}

/* Title */
#title{
position:fixed;
top:20px;
width:100%;
text-align:center;
font-size:34px;
color:white;
z-index:10;
text-shadow:0 0 10px black;
}

/* Start message under title */
#startMessage{
margin-top:10px;
font-size:18px;
color:white;
opacity:0.9;
animation:pulse 1.5s infinite;
}

body.mobile #startMessage{
font-size:22px;
}

@keyframes pulse{
0%{opacity:0.6;}
50%{opacity:1;}
100%{opacity:0.6;}
}

/* GIF container */
#gifContainer{
position:relative;
width:90%;
max-width:900px;
height:70vh;
}

/* GIFs */
.gif{
position:absolute;
max-width:100%;
max-height:100%;
left:50%;
top:50%;
transform:translate(-50%,-50%);
border-radius:12px;
opacity:0;
transition:opacity 1s ease;
}

.gif.active{
opacity:1;
}

/* Sparkles */
.sparkle{
position:fixed;
width:10px;
height:10px;
background:white;
border-radius:50%;
pointer-events:none;
animation:sparkleAnim 0.9s forwards;
}

@keyframes sparkleAnim{
0%{transform:scale(1);opacity:1;}
100%{transform:scale(4);opacity:0;}
}

/* Button default (PC) */
#muteButton{
position:fixed;
bottom:20px;
right:20px;
padding:12px 18px;
font-size:16px;
border:none;
border-radius:10px;
background:#222;
color:white;
cursor:pointer;
z-index:20;
}

/* Tablet */
body.tablet #muteButton{
padding:16px 24px;
font-size:18px;
border-radius:12px;
}

/* Mobile */
body.mobile #muteButton{
left:50%;
right:auto;
transform:translateX(-50%);
bottom:25px;
padding:20px 30px;
font-size:20px;
border-radius:14px;
}

</style>
</head>

<body>

<div id="title">
  FISH SLAP INFINATE 🐟 Thanks Louis
  <div id="startMessage">Touch/click on your screen/webpage for a surprise 😉</div>
</div>

<div id="gifContainer">

<img class="gif active" src="https://media.giphy.com/media/v1.Y2lkPTc5MGI3NjExYnNuaDE4eGRmazAzeWhzNjZtcmpwNDM4MDgxNzlmc214bGY5bDdyeSZlcD12MV9naWZzX3NlYXJjaCZjdD1n/rgjwOLuv0azHW/giphy.gif">
<img class="gif" src="https://media.giphy.com/media/v1.Y2lkPTc5MGI3NjExYnNuaDE4eGRmazAzeWhzNjZtcmpwNDM4MDgxNzlmc214bGY5bDdyeSZlcD12MV9naWZzX3NlYXJjaCZjdD1n/jX708Wo6abfC8/giphy.gif">
<img class="gif" src="https://media.giphy.com/media/v1.Y2lkPTc5MGI3NjExYnNuaDE4eGRmazAzeWhzNjZtcmpwNDM4MDgxNzlmc214bGY5bDdyeSZlcD12MV9naWZzX3NlYXJjaCZjdD1n/xT0BKGkoBW46ip9OvK/giphy.gif">
<img class="gif" src="https://media.giphy.com/media/v1.Y2lkPTc5MGI3NjExYnNuaDE4eGRmazAzeWhzNjZtcmpwNDM4MDgxNzlmc214bGY5bDdyeSZlcD12MV9naWZzX3NlYXJjaCZjdD1n/y6IvUPfopAZqg/giphy.gif">
<img class="gif" src="https://media.giphy.com/media/v1.Y2lkPTc5MGI3NjExYnNuaDE4eGRmazAzeWhzNjZtcmpwNDM4MDgxNzlmc214bGY5bDdyeSZlcD12MV9naWZzX3NlYXJjaCZjdD1n/26Fff1rJ62MGWEdzO/giphy.gif">
<img class="gif" src="https://media.giphy.com/media/v1.Y2lkPTc5MGI3NjExYnNuaDE4eGRmazAzeWhzNjZtcmpwNDM4MDgxNzlmc214bGY5bDdyeSZlcD12MV9naWZzX3NlYXJjaCZjdD1n/ldUr9VPakWkjNn1Paj/giphy.gif">
<img class="gif" src="https://media.giphy.com/media/v1.Y2lkPTc5MGI3NjExYnNuaDE4eGRmazAzeWhzNjZtcmpwNDM4MDgxNzlmc214bGY5bDdyeSZlcD12MV9naWZzX3NlYXJjaCZjdD1n/M9pbjBHbdYs36/giphy.gif">

</div>

<button id="muteButton">🔊 Mute</button>

<iframe
id="musicPlayer"
width="0"
height="0"
src="https://www.youtube.com/embed/U06jlgpMtQs?autoplay=1&loop=1&playlist=U06jlgpMtQs"
frameborder="0"
allow="autoplay">
</iframe>

<script>

/* DEVICE DETECTION */
function detectDevice(){
const width = window.innerWidth;

if(width <= 600){
document.body.classList.add("mobile");
}
else if(width <= 1024){
document.body.classList.add("tablet");
}
else{
document.body.classList.add("desktop");
}
}

detectDevice();

window.addEventListener("resize", ()=>{
document.body.classList.remove("mobile","tablet","desktop");
detectDevice();
});

/* VIBRATION */
function vibrateTap(){
if(navigator.vibrate){
navigator.vibrate(50);
}
}

function vibrateSlap(){
if(navigator.vibrate){
navigator.vibrate([40,20,40]);
}
}

/* GIF LOOP */
const gifs = document.querySelectorAll(".gif");
let index = 0;

function nextGif(){
gifs[index].classList.remove("active");
index = (index + 1) % gifs.length;
gifs[index].classList.add("active");

vibrateSlap();
}

setInterval(nextGif, 8000);

/* SPARKLES */
function sparkle(x,y){
const s=document.createElement("div");
s.className="sparkle";
s.style.left=x+"px";
s.style.top=y+"px";
document.body.appendChild(s);
setTimeout(()=>s.remove(),900);
}

document.addEventListener("mousemove",(e)=>sparkle(e.clientX,e.clientY));
document.addEventListener("touchmove",(e)=>{
const t=e.touches[0];
sparkle(t.clientX,t.clientY);
});

/* MUSIC */
let playing = true;
const iframe = document.getElementById("musicPlayer");
const button = document.getElementById("muteButton");
const startMessage = document.getElementById("startMessage");

let started = false;

/* FIRST TAP ANYWHERE */
function firstInteraction(){

if(started) return;

started = true;

/* start music */
iframe.src = "https://www.youtube.com/embed/U06jlgpMtQs?autoplay=1&loop=1&playlist=U06jlgpMtQs";
button.textContent = "🔇 Mute";
playing = true;

/* vibration */
if(navigator.vibrate){
navigator.vibrate([50,30,50]);
}

/* hide message */
startMessage.style.display = "none";

document.removeEventListener("click", firstInteraction);
document.removeEventListener("touchstart", firstInteraction);
}

document.addEventListener("click", firstInteraction);
document.addEventListener("touchstart", firstInteraction);

/* BUTTON */
button.onclick = function(){

vibrateTap();

if(playing){
iframe.src = "";
button.textContent = "🔊 Unmute";
playing = false;
}else{
iframe.src = "https://www.youtube.com/embed/U06jlgpMtQs?autoplay=1&loop=1&playlist=U06jlgpMtQs";
button.textContent = "🔇 Mute";
playing = true;
}

};

</script>

</body>
</html>
