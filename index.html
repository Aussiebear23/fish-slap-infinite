<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>Fish Slap Infinite</title>

<style>
body {
  margin: 0;
  background: #111;
  display: flex;
  justify-content: center;
  align-items: center;
  height: 100vh;
  overflow: hidden;
  font-family: Arial, sans-serif;
  user-select: none; /* Prevents accidental text highlighting while slapping */
}

/* Title */
#title {
  position: fixed;
  top: 20px;
  width: 100%;
  text-align: center;
  color: white;
  font-size: 30px;
  z-index: 10;
  font-weight: bold;
}

/* Message */
#startMessage {
  font-size: 16px;
  margin-top: 8px;
  animation: pulse 1.5s infinite;
  font-weight: normal;
}

@keyframes pulse {
  0% { opacity: 0.6; }
  50% { opacity: 1; }
  100% { opacity: 0.6; }
}

/* GIF container */
#gifContainer {
  position: relative;
  width: 88%;
  max-width: 900px;
  height: 55vh;
  display: flex;
  justify-content: center;
  align-items: center;
}

/* PC Sizing */
@media(min-width: 1025px) {
  #gifContainer {
    height: 72vh;
    max-width: 1200px;
  }
}

/* Mobile Sizing */
@media(max-width: 600px) {
  #gifContainer {
    height: 45vh; 
    width: 95%;
  }
  #title {
    font-size: 24px; 
  }
}

/* GIF Styling */
.gif {
  position: absolute;
  width: 100%;
  height: 100%;
  object-fit: contain; 
  left: 50%;
  top: 50%;
  transform: translate(-50%, -50%);
  border-radius: 12px;
  opacity: 0;
  transition: opacity 1s ease-in-out;
}

.gif.active {
  opacity: 1;
}

/* Sparkles */
.sparkle {
  position: fixed;
  width: 12px;
  height: 12px;
  background: white;
  border-radius: 50%;
  pointer-events: none;
  animation: sparkle 0.9s forwards;
  z-index: 5;
  box-shadow: 0 0 8px rgba(255,255,255,0.8);
}

@keyframes sparkle {
  to {
    transform: scale(4);
    opacity: 0;
  }
}

/* Controls Container (Bottom layout) */
#controls {
  position: fixed;
  bottom: 20px;
  width: 100%;
  display: flex;
  justify-content: space-between;
  align-items: center;
  padding: 0 20px;
  box-sizing: border-box;
  z-index: 10;
}

/* Slap Counter */
#slapCounter {
  color: white;
  font-size: 20px;
  font-weight: bold;
  background: rgba(0, 0, 0, 0.5);
  padding: 10px 15px;
  border-radius: 10px;
}

/* Button */
#muteButton {
  padding: 14px 20px;
  font-size: 16px;
  background: #222;
  color: white;
  border: 2px solid #444;
  border-radius: 10px;
  cursor: pointer;
  font-weight: bold;
}

/* BIG mobile controls */
@media(max-width: 600px) {
  #controls {
    bottom: 30px;
  }
  #muteButton {
    padding: 18px 28px;
    font-size: 20px;
    border-radius: 16px;
  }
  #slapCounter {
    font-size: 18px;
  }
}
</style>
</head>
<body>

<div id="title">
  FISH SLAP INFINITE 🐟 Thanks Louis
  <div id="startMessage">Touch/click for a surprise 😉</div>
</div>

<div id="gifContainer">
  <img class="gif active" style="z-index: 2;" src="https://media.giphy.com/media/rgjwOLuv0azHW/giphy.gif" alt="Fish slap 1">
  <img class="gif" src="https://media.giphy.com/media/jX708Wo6abfC8/giphy.gif" alt="Fish slap 2">
  <img class="gif" src="https://media.giphy.com/media/xT0BKGkoBW46ip9OvK/giphy.gif" alt="Fish slap 3">
  <img class="gif" src="https://media.giphy.com/media/y6IvUPfopAZqg/giphy.gif" alt="Fish slap 4">
</div>

<div id="controls">
  <div id="slapCounter">Slaps: 0</div>
  <button id="muteButton">🔊 Mute</button>
</div>

<iframe id="musicPlayer" width="0" height="0" src="" allow="autoplay"></iframe>

<script>
// --- ✅ PERFECTED GIF CROSSFADE ---
const gifs = document.querySelectorAll(".gif");
let i = 0;

setInterval(() => {
  let oldIndex = i;
  i = (i + 1) % gifs.length;

  // Put old GIF in the background
  gifs[oldIndex].style.zIndex = "1";

  // Bring new GIF to the front and fade it in
  gifs[i].style.zIndex = "2";
  gifs[i].classList.add("active");

  // Wait EXACTLY 1 second for the fade to finish, then hide the old GIF entirely
  setTimeout(() => {
    gifs[oldIndex].classList.remove("active");
  }, 1000);

  // Vibrate on GIF change
  if (navigator.vibrate && started) {
    navigator.vibrate([40, 20, 40]);
  }
}, 8000);

// --- SPARKLES, VIBRATION & SLAP COUNTER ---
let totalSlaps = 0;
const counterDisplay = document.getElementById("slapCounter");

function addSlap() {
  totalSlaps++;
  counterDisplay.textContent = `Slaps: ${totalSlaps}`;
}

function sparkle(x, y) {
  const s = document.createElement("div");
  s.className = "sparkle";
  s.style.left = x + "px";
  s.style.top = y + "px";
  document.body.appendChild(s);
  setTimeout(() => s.remove(), 900);
  
  addSlap(); // Every sparkle counts as a slap!
}

let lastVibeTime = 0;
function moveVibrate() {
  if (!started) return; 

  if (navigator.vibrate) {
    const now = Date.now();
    if (now - lastVibeTime > 150) { 
      navigator.vibrate(30); 
      lastVibeTime = now;
    }
  }
}

// Track mouse and touch movement
document.addEventListener("pointermove", e => {
  // Only create sparkles if the user is actually clicking/touching the screen
  if (e.buttons > 0 || e.pointerType === "touch") {
    sparkle(e.clientX, e.clientY);
    moveVibrate();
  }
});

// --- MUSIC & INITIAL TAP ---
const iframe = document.getElementById("musicPlayer");
const btn = document.getElementById("muteButton");
const msg = document.getElementById("startMessage");

let started = false;
let playing = false;

function interact(e) {
  if (e.target === btn) return; 

  // Single tap sparkle
  sparkle(e.clientX, e.clientY);

  if (navigator.vibrate) {
    navigator.vibrate(60); 
  }

  if (!started) {
    iframe.src = "https://www.youtube.com/embed/U06jlgpMtQs?autoplay=1&loop=1&playlist=U06jlgpMtQs";
    msg.style.display = "none";
    started = true;
    playing = true;
    btn.textContent = "🔇 Mute";
  }
}

document.addEventListener("pointerdown", interact);

// --- MUTE BUTTON ---
btn.onclick = () => {
  if (navigator.vibrate) {
    navigator.vibrate(60);
  }

  if (playing) {
    iframe.src = "";
    btn.textContent = "🔊 Unmute";
    playing = false;
  } else {
    iframe.src = "https://www.youtube.com/embed/U06jlgpMtQs?autoplay=1&loop=1&playlist=U06jlgpMtQs";
    btn.textContent = "🔇 Mute";
    playing = true;
  }
};
</script>

</body>
</html>
