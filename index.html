<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>Fish Slap Infinite</title>

<style>
body{
  margin:0;
  background:#111;
  display:flex;
  justify-content:center;
  align-items:center;
  height:100vh;
  overflow:hidden;
  font-family:Arial;
}

/* Title */
#title{
  position:fixed;
  top:20px;
  width:100%;
  text-align:center;
  color:white;
  font-size:30px;
  z-index:10;
}

/* Message */
#startMessage{
  font-size:16px;
  margin-top:8px;
  animation:pulse 1.5s infinite;
}

@keyframes pulse{
  0%{opacity:0.6;}
  50%{opacity:1;}
  100%{opacity:0.6;}
}

/* GIF container */
#gifContainer{
  position:relative;
  width:88%;
  max-width:900px;
  height:55vh;
  display:flex;
  justify-content:center;
  align-items:center;
}

/* Desktop */
@media(min-width:1025px){
  #gifContainer{
    height:58vh;
    max-width:950px;
  }
}

/* Mobile */
@media(max-width:600px){
  #gifContainer{
    height:38vh;
    max-width:92%;
  }
}

/* GIF */
.gif{
  position:absolute;
  max-width:100%;
  max-height:100%;
  left:50%;
  top:50%;
  transform:translate(-50%,-50%);
  border-radius:12px;
  opacity:0;
  transition:opacity 1s ease;
}

.gif.active{
  opacity:1;
}

/* Sparkles */
.sparkle{
  position:fixed;
  width:10px;
  height:10px;
  background:white;
  border-radius:50%;
  pointer-events:none;
  animation:sparkle 0.9s forwards;
}

@keyframes sparkle{
  to{
    transform:scale(4);
    opacity:0;
  }
}

/* Button */
#muteButton{
  position:fixed;
  bottom:20px;
  right:20px;
  padding:14px 20px;
  font-size:16px;
  background:#222;
  color:white;
  border:none;
  border-radius:10px;
}

/* BIG mobile button */
@media(max-width:600px){
  #muteButton{
    left:50%;
    transform:translateX(-50%);
    padding:22px 36px;
    font-size:22px;
    border-radius:16px;
  }
}
</style>
</head>
<body>

<div id="title">
  FISH SLAP INFINATE 🐟 Thanks Louis
  <div id="startMessage">Touch/click for a surprise 😉</div>
</div>

<div id="gifContainer">
  <img class="gif active" src="https://media.giphy.com/media/rgjwOLuv0azHW/giphy.gif">
  <img class="gif" src="https://media.giphy.com/media/jX708Wo6abfC8/giphy.gif">
  <img class="gif" src="https://media.giphy.com/media/xT0BKGkoBW46ip9OvK/giphy.gif">
  <img class="gif" src="https://media.giphy.com/media/y6IvUPfopAZqg/giphy.gif">
</div>

<button id="muteButton">🔊 Mute</button>

<!-- Music -->
<iframe id="musicPlayer"
width="0"
height="0"
src=""
allow="autoplay">
</iframe>

<script>
const gifs = document.querySelectorAll(".gif");
let i = 0;

setInterval(()=>{
  gifs[i].classList.remove("active");
  i = (i+1)%gifs.length;
  gifs[i].classList.add("active");

  if(navigator.vibrate){
    navigator.vibrate([40,20,40]);
  }
},8000);

/* sparkles */
function sparkle(x,y){
  const s=document.createElement("div");
  s.className="sparkle";
  s.style.left=x+"px";
  s.style.top=y+"px";
  document.body.appendChild(s);
  setTimeout(()=>s.remove(),900);
}

document.addEventListener("mousemove",e=>sparkle(e.clientX,e.clientY));
document.addEventListener("touchmove",e=>{
  sparkle(e.touches[0].clientX,e.touches[0].clientY);
});

/* music */
const iframe=document.getElementById("musicPlayer");
const btn=document.getElementById("muteButton");
const msg=document.getElementById("startMessage");

let started=false;
let playing=false;

/* tap anywhere */
function interact(){
  if(navigator.vibrate){
    navigator.vibrate(60);
  }

  if(!started){
    iframe.src="https://www.youtube.com/embed/U06jlgpMtQs?autoplay=1&loop=1&playlist=U06jlgpMtQs";
    msg.style.display="none";
    started=true;
    playing=true;
    btn.textContent="🔇 Mute";
  }
}

document.addEventListener("pointerdown",interact);

/* button */
btn.onclick=()=>{
  if(navigator.vibrate){
    navigator.vibrate(60);
  }

  if(playing){
    iframe.src="";
    btn.textContent="🔊 Unmute";
    playing=false;
  }else{
    iframe.src="https://www.youtube.com/embed/U06jlgpMtQs?autoplay=1&loop=1&playlist=U06jlgpMtQs";
    btn.textContent="🔇 Mute";
    playing=true;
  }
};
</script>

</body>
</html>
